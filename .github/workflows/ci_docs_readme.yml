name: CI - Docs & Readme

on:
  push:
    branches: [ main ]
    paths:
      - 'community_app/**'

permissions:
  contents: write # Needed for updating the README
  pages: write    # Needed for deploying to Pages
  id-token: write # Needed for security/deployment

jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Generate DocC
      - name: Build DocC
        working-directory: community_app
        run: |
          mkdir -p ./docs
          xcodebuild docbuild \
            -project community_app.xcodeproj \
            -scheme community_app \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath /tmp/docbuild \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Transform Documentation
        working-directory: community_app
        run: |
          ARCHIVE_PATH="/tmp/docbuild/Build/Products/Debug-iphonesimulator"
          mkdir -p ./docs

          # Find and transform
          archive=$(find "$ARCHIVE_PATH" -name "*.doccarchive" | head -n 1)
          target_name=$(basename "$archive" .doccarchive)

          # 1. Transform to ./docs
          # We use the repository name for hosting-base-path
          xcrun docc process-archive transform-for-static-hosting "$archive" \
            --output-path "./docs" \
            --hosting-base-path "${{ github.event.repository.name }}"

          # 2. Check the path!
          # After running this, list the files to be sure where they are
          ls -R ./docs

          # Create root index redirect
          echo "<html><head><meta http-equiv='refresh' content='0; url=documentation/index.html' /></head><body></body></html>" > ./docs/index.html
          
      # 3. Deploy to GitHub Pages (Uses Artifacts - No commit required)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './community_app/docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
